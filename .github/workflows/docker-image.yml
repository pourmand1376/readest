name: Publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      BUILD_ARGS: |
        NEXT_PUBLIC_APP_PLATFORM=web
        NEXT_PUBLIC_OBJECT_STORAGE_TYPE=s3
        NEXT_PUBLIC_STORAGE_FIXED_QUOTA=1073741824
        NEXT_PUBLIC_TRANSLATION_FIXED_QUOTA=50000
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e8 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4c0212d1d46950b5d4f6e1b0f36256d1d90fbe0f # v3

      - name: Log in to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Docker Hub credentials
        id: dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata (GHCR only)
        id: meta-ghcr
        if: steps.dockerhub.outputs.enabled != 'true'
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/readest
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Extract image metadata (GHCR + Docker Hub)
        id: meta-all
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/readest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/readest
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push (GHCR only)
        if: steps.dockerhub.outputs.enabled != 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          target: production-stage
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: ${{ env.BUILD_ARGS }}

      - name: Build and push (GHCR + Docker Hub)
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          target: production-stage
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-all.outputs.tags }}
          labels: ${{ steps.meta-all.outputs.labels }}
          build-args: ${{ env.BUILD_ARGS }}
