name: Publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e8 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4c0212d1d46950b5d4f6e1b0f36256d1d90fbe0f # v3

      - name: Log in to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/readest
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('docker.io/{0}/readest', secrets.DOCKERHUB_USERNAME) || '' }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production-stage
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=http://localhost:8000
            NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key-jwt-signed-with-jwt-secret
            NEXT_PUBLIC_APP_PLATFORM=web
            NEXT_PUBLIC_API_BASE_URL=http://localhost:3000
            NEXT_PUBLIC_OBJECT_STORAGE_TYPE=s3
            NEXT_PUBLIC_STORAGE_FIXED_QUOTA=1073741824
            NEXT_PUBLIC_TRANSLATION_FIXED_QUOTA=50000
