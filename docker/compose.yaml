name: readest

services:
  db:
    container_name: supabase-db
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    volumes:
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./volumes/db/init/schema.sql:/docker-entrypoint-initdb.d/init-scripts/100-schema.sql:Z
      - ./volumes/db/migrations/001_add_rsvp_position.sql:/docker-entrypoint-initdb.d/init-scripts/101-migration-001.sql:Z
      - ./volumes/db/migrations/002_add_book_shares.sql:/docker-entrypoint-initdb.d/init-scripts/102-migration-002.sql:Z
      - ./volumes/db/migrations/003_add_replicas.sql:/docker-entrypoint-initdb.d/init-scripts/103-migration-003.sql:Z
      - ./volumes/db/migrations/004_crdt_merge_replica_fn.sql:/docker-entrypoint-initdb.d/init-scripts/104-migration-004.sql:Z
      - ./volumes/db/migrations/005_replica_manifest_cursor_updated_at.sql:/docker-entrypoint-initdb.d/init-scripts/105-migration-005.sql:Z
      - ./volumes/db/migrations/006_replica_more_kinds.sql:/docker-entrypoint-initdb.d/init-scripts/106-migration-006.sql:Z
      - ./volumes/db/migrations/007_files_replica_grouping.sql:/docker-entrypoint-initdb.d/init-scripts/107-migration-007.sql:Z
      - ./volumes/db/migrations/008_replica_keys_rpcs.sql:/docker-entrypoint-initdb.d/init-scripts/108-migration-008.sql:Z
      - ./volumes/db/migrations/009_replica_opds_catalog.sql:/docker-entrypoint-initdb.d/init-scripts/109-migration-009.sql:Z
      - ./volumes/db/migrations/010_replica_keys_forget.sql:/docker-entrypoint-initdb.d/init-scripts/110-migration-010.sql:Z
      - ./volumes/db/migrations/011_replica_settings.sql:/docker-entrypoint-initdb.d/init-scripts/111-migration-011.sql:Z
      - ./volumes/db/migrations/012_send_to_readest.sql:/docker-entrypoint-initdb.d/init-scripts/112-migration-012.sql:Z
      - ./volumes/db/migrations/013_add_book_notes_global.sql:/docker-entrypoint-initdb.d/init-scripts/113-migration-013.sql:Z
      - db-data:/var/lib/postgresql/data:Z
      - db-config:/etc/postgresql-custom
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

  kong:
    container_name: supabase-kong
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "${KONG_HTTP_PORT}:8000/tcp"
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro,z
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'

  auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.185.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}

  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v14.3
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    command: ["postgrest"]

  minio:
    container_name: readest-minio
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server --console-address ":9001" /data
    volumes:
      - minio-data:/data:z
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing myminio/${S3_BUCKET_NAME}
      "

  client:
    container_name: readest-client
    image: ${READEST_IMAGE:-ghcr.io/readest/readest:latest}
    pull_policy: missing
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://${HOST_IP}:${KONG_HTTP_PORT:-8000}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_ADMIN_KEY: ${SERVICE_ROLE_KEY}
      API_BASE_URL: http://${HOST_IP}:3000
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://${HOST_IP}:9000
      S3_REGION: us-east-1
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      OBJECT_STORAGE_TYPE: ${OBJECT_STORAGE_TYPE:-s3}
      STORAGE_FIXED_QUOTA: ${STORAGE_FIXED_QUOTA:-1073741824}
      TRANSLATION_FIXED_QUOTA: ${TRANSLATION_FIXED_QUOTA:-50000}
    depends_on:
      - kong
      - minio

volumes:
  db-config:
  db-data:
  minio-data:
